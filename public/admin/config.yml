# Decap CMS (formerly Netlify CMS) — git-based, free, no backend server.
# This collection mirrors the Project schema the site renders (src/cms.ts).
# To go live: deploy, enable a backend (git-gateway + Netlify Identity, or the
# `github`/`gitlab` backend), set VITE_CMS_SOURCE=decap, and add a small build
# step that compiles content/projects/*.md into data/projects.json (or point
# the decap adapter at the generated JSON). Adding a render then = one entry here.

backend:
  name: git-gateway
  branch: main

media_folder: "public/renders" # where uploaded renders are stored
public_folder: "/renders" # how they are referenced on the site

collections:
  - name: "projects"
    label: "Projects"
    label_singular: "Project"
    folder: "content/projects"
    create: true
    slug: "{{order}}-{{slug}}"
    summary: "{{order}} · {{title}} ({{category}})"
    sortable_fields: ["order", "year", "title"]
    fields:
      - { name: "title", label: "Title", widget: "string" }
      - {
          name: "category",
          label: "Category",
          widget: "select",
          options: ["architecture", "interior", "product", "experimental"],
        }
      - { name: "year", label: "Year", widget: "number", value_type: "int", min: 1990, max: 2100 }
      - { name: "engine", label: "Render engine", widget: "string", hint: "e.g. Corona, V-Ray, Unreal" }
      - { name: "image", label: "Render", widget: "image", hint: "Main render — served responsively via the image CDN." }
      - {
          name: "depthMap",
          label: "Depth map (optional)",
          widget: "image",
          required: false,
          hint: "Grayscale depth map of the same image, for the WebGL hero.",
        }
      - { name: "featured", label: "Featured (hero piece)", widget: "boolean", default: false }
      - { name: "order", label: "Order", widget: "number", value_type: "int", default: 99 }
